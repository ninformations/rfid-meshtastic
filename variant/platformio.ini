; RFID-Meshtastic Custom Variant
; nRF52840 Pro Micro + Wio SX1262 + RDM6300
;
; This file defines the PlatformIO build environment for our custom board.
; It extends the standard nrf52840_base from the Meshtastic firmware.

[env:nrf52_promicro_rfid]
extends = nrf52840_base
board = promicro-nrf52840

build_flags = ${nrf52840_base.build_flags}
  -I variants/nrf52840/diy/nrf52_promicro_rfid
  -D NRF52_PROMICRO_RFID
  -D PRIVATE_HW
  -D HAS_GPS=0
  -D GPS_RX_PIN=-1
  -D GPS_TX_PIN=-1

build_src_filter = ${nrf52_base.build_src_filter}
  +<../variants/nrf52840/diy/nrf52_promicro_rfid>

lib_deps = ${nrf52840_base.lib_deps}

debug_tool = jlink
